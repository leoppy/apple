# V 模型用例-需求双向追溯检查工具 - 配置文件

# ============================================
# 测试模式配置（用于开发和调试）
# ============================================
# 使用方法：python v_model_tracer.py --config config_test.yaml
test_mode:
  enabled: false                      # 是否启用测试模式
  # 测试用单个模块（BSWM）
  r4j_projects:
    - name: "BSWM-系统需求"
      node_id: 142030                 # BSWM 模块需求
      project_id: 10001               # CPP 项目 ID
      level: "system_requirement"     # 系统需求层级

  confluence_testcases:
    - page_id: 106154865              # BSWM 测试用例页面
      test_type: "software_test"      # 软件测试类型
      traverse_children: false        # 单页面，不遍历子页面
      excel_columns:
        id: "用例ID"
        name: "用例名称"
        trace: "对应需求编号"
        result: "测试结果"
      sheet_pattern: ".*测试用例.*"
      result_mapping:
        passed: ["通过", "PASS", "OK", "Pass"]
        failed: ["失败", "FAIL", "NG", "Fail"]
        not_executed: ["未执行", "N/A", "-", ""]

# ============================================
# R4J 项目配置（正式环境）
# ============================================
r4j_projects:
  # 项目 1：CPP 项目（系统需求）
  - name: "CPP-系统需求"
    node_id: 139342                   # 软件需求规范_V3.1
    project_id: 10001                 # CPP 项目 ID（请根据实际情况修改）
    level: "system_requirement"       # 固定层级：系统需求

  # 项目 2：CPD 项目（架构设计）
  - name: "CPD-架构设计"
    node_id: 1106                     # 软件架构设计
    project_id: 10002                 # CPD 项目 ID
    level: "architecture_design"      # 固定层级：架构设计

  # 项目 3：CPD 项目（详细设计）
  - name: "CPD-详细设计"
    node_id: 1105                     # 软件详细设计
    project_id: 10002                 # CPD 项目 ID
    level: "detailed_design"          # 固定层级：详细设计

# ============================================
# Confluence 测试用例配置
# ============================================
confluence_testcases:
  # 单元测试用例（需要遍历子页面）
  - page_id: 98511442                 # 单元测试报告和用例页面 ID
    test_type: "unit_test"            # 测试类型：unit_test
    traverse_children: true           # 遍历子页面获取所有附件

    # Excel 列名映射（统一格式）
    excel_columns:
      id: "用例ID"                    # 用例 ID 列名
      name: "用例名称"                # 用例名称列名（可选）
      trace: "对应需求编号"           # 追溯需求列名
      result: "测试结果"              # 测试结果列名

    # Sheet 名称识别规则（用于识别测试类型）
    sheet_pattern: ".*测试用例.*"     # 正则表达式匹配 Sheet 名称

    # 测试结果映射（支持多种表述方式）
    result_mapping:
      passed: ["通过", "PASS", "成功", "OK", "✓", "Pass"]
      failed: ["失败", "FAIL", "错误", "NG", "✗", "Fail"]
      not_executed: ["未执行", "N/A", "待执行", "-", "", "未测试"]

  # 集成测试用例（需要遍历子页面）
  - page_id: 106154999                # 集成测试页面 ID
    test_type: "integration_test"     # 测试类型：integration_test
    traverse_children: true           # 遍历子页面获取所有附件
    excel_columns:
      id: "用例ID"
      name: "用例名称"
      trace: "对应需求编号"
      result: "测试结果"
    sheet_pattern: ".*测试用例.*"
    result_mapping:
      passed: ["通过", "PASS", "OK", "Pass"]
      failed: ["失败", "FAIL", "NG", "Fail"]
      not_executed: ["未执行", "N/A", "-", ""]

  # 软件测试用例（需要遍历子页面）
  - page_id: 106154862                # 软件测试页面 ID
    test_type: "software_test"        # 测试类型：software_test
    traverse_children: true           # 遍历子页面获取所有附件
    excel_columns:
      id: "用例ID"
      name: "用例名称"
      trace: "对应需求编号"
      result: "测试结果"
    sheet_pattern: ".*测试用例.*"
    result_mapping:
      passed: ["通过", "PASS", "OK", "Pass"]
      failed: ["失败", "FAIL", "NG", "Fail"]
      not_executed: ["未执行", "N/A", "-", ""]

# ============================================
# V 模型映射规则
# ============================================
v_model_mapping:
  unit_test: "detailed_design"        # 单元测试 ↔ 详细设计
  integration_test: "architecture_design"  # 集成测试 ↔ 架构设计
  software_test: "system_requirement"      # 软件测试 ↔ 系统需求

# ============================================
# 缓存配置
# ============================================
cache:
  enabled: true                       # 是否启用缓存
  ttl_hours: 24                       # 缓存有效期（小时）
  dir: "tempFile/cache"               # 缓存目录

# ============================================
# 输出配置
# ============================================
output:
  dir: "tempFile/reports"             # 报告输出目录
  filename_template: "v_model_trace_report_{timestamp}.xlsx"  # 文件名模板

# ============================================
# API 配置
# ============================================
api:
  delay_ms: 2000                       # 请求延迟（毫秒），避免 API 限流
  timeout: 30                         # 超时时间（秒）
  retry_times: 3                      # 失败重试次数

# ============================================
# 日志配置
# ============================================
logging:
  level: "INFO"                       # 日志级别：DEBUG/INFO/WARNING/ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
